spring.application.name=LdapSample
ldap.enabled :false
ldap.urls :ldap://localhost:8389/
ldap.base.dn :dc=example,dc=com
ldap.password :userPassword
ldap.user.dn.pattern :uid={0},ou=people
ldap.user.searchBase:ou=people,dc=example,dc=com
ldap.user.searchFilter:(uid={0})
ldap.username :ou=people,dc=example,dc=com
app.jwtExpirationInMs = 604800000
spring.ldap.embedded.ldif=classpath:sample.ldif
spring.ldap.embedded.base-dn=dc=example,dc=com
spring.ldap.embedded.port=8389
spring.ldap.embedded.url=ldap://localhost:8389/
spring.ldap.userid=uid
ldap.user.commanName=cn
ldap.user.password=[PROTECTED]